<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>ST117 — Art Studio</title>
<meta name="description" content="ST117 is a visual art studio from North Macedonia, working across painting, drawing, photography and printmaking."/>
<meta name="keywords" content="ST117, visual art, studio, painting, printmaking, photography, drawings, North Macedonia"/>
<meta name="author" content="ST117 Studio"/>
<meta name="robots" content="index, follow"/>
<link rel="canonical" href="https://sitoshtyp-creator.github.io/sitoshtyp-creator/"/>

<meta property="og:type" content="website"/>
<meta property="og:url" content="https://sitoshtyp-creator.github.io/sitoshtyp-creator/"/>
<meta property="og:title" content="ST117 — Visual Art Studio"/>
<meta property="og:description" content="Original paintings, drawings, photography and printmaking from North Macedonia."/>
<meta property="og:image" content="https://sitoshtyp-creator.github.io/sitoshtyp-creator/images/og-cover.jpg"/>

<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="ST117 — Visual Art Studio"/>
<meta name="twitter:image" content="https://sitoshtyp-creator.github.io/sitoshtyp-creator/images/og-cover.jpg"/>

<script type="application/ld+json">
{"@context":"https://schema.org","@type":"ArtGallery","name":"ST117 Studio","description":"Visual art studio working across painting, drawing, photography and printmaking.","url":"https://sitoshtyp-creator.github.io/sitoshtyp-creator/","address":{"@type":"PostalAddress","addressCountry":"MK"},"sameAs":["https://www.instagram.com/print_117"]}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700&family=Inter:wght@900&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08080a;--bg2:#0d0d10;--bg3:#131316;
  --ink:#f8f6f2;--ink-mid:#a19d96;--ink-soft:#706d68;
  --red:#c8102e;--red-h:#e5142e;--red-a:rgba(200,16,46,.12);
  --glass:rgba(12,12,15,.85);--glass-bdr:rgba(255,255,255,.08);--glass-top:rgba(255,255,255,.06);
  --blur:blur(40px) saturate(180%) brightness(1.2);
  --ease:cubic-bezier(0.19,1,0.22,1);
  --rad:14px;--rad-btn:8px;
}
:root.light{
  --bg:#fdfcfb;--bg2:#f5f3f0;--bg3:#eeebe7;
  --ink:#1a1a1c;--ink-mid:#5a5752;--ink-soft:#9b9792;
  --glass:rgba(255,255,255,.88);--glass-bdr:rgba(0,0,0,.07);--glass-top:rgba(255,255,255,.98);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;overflow-x:hidden;line-height:1.6;-webkit-font-smoothing:antialiased;}
.bf{font-family:'Inter',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:-.05em;}

/* ── CURSOR ── */
#cur,#cur-ring{position:fixed;top:0;left:0;pointer-events:none;z-index:99999;border-radius:50%;will-change:transform;}
#cur{width:10px;height:10px;background:var(--red);transform:translate(-50%,-50%);}
#cur-ring{width:36px;height:36px;border:1.5px solid rgba(200,16,46,.4);transform:translate(-50%,-50%);}

/* ── INTRO ── */
.intro-screen{position:fixed;inset:0;z-index:9000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .45s ease;}
.intro-screen.out{opacity:0;}
.intro-brand{font-size:clamp(3.5rem,12vw,9rem);line-height:1;}
.intro-brand .inum{color:var(--red);}

/* ── NAV ── */
.nav-container{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:.75rem 4vw;display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,10,.75);backdrop-filter:blur(28px);}
.nav-logo{font-size:.95rem;text-decoration:none;color:var(--ink);font-weight:900;}
#mainNav{display:flex;gap:.15rem;background:var(--glass);padding:.28rem;border-radius:var(--rad);border:1px solid var(--glass-bdr);}
.nav-btn{background:none;border:none;cursor:pointer;padding:.52rem 1rem;font-size:.6rem;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.14em;}
.nav-btn.active{color:#fff;background:var(--red);border-radius:var(--rad-btn);}

/* ── HERO ── */
#home{height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;}
.hero-title{font-size:clamp(5rem,18vw,16rem);line-height:.82;margin-bottom:1.2rem;}
.hero-title .ht-num{color:var(--red);font-style:italic;}
.hero-sub{font-size:.58rem;font-weight:700;letter-spacing:.6em;text-transform:uppercase;color:var(--ink-soft);}

/* ── SECTIONS ── */
.sec{padding:7rem 5vw;}
.sec-header{margin-bottom:5rem;text-align:center;}
.sec-title{font-family:'DM Serif Display',serif;font-size:clamp(2.8rem,7vw,5rem);}

/* ── GALLERY ── */
.feed{columns:4;column-gap:.8rem;}
@media(max-width:900px){.feed{columns:2;}}
.feed-card{break-inside:avoid;margin-bottom:.8rem;position:relative;overflow:hidden;border-radius:var(--rad);border:1px solid var(--glass-bdr);cursor:pointer;}
.feed-card img{width:100%;display:block;transition:transform .6s ease;}
.feed-card:hover img{transform:scale(1.05);}

/* ── LIGHTBOX ── */
.lb-wrap{position:fixed;inset:0;z-index:9500;display:none;background:rgba(2,2,4,.98);flex-direction:column;}
.lb-wrap.open{display:flex;}
.lb-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
#lbImg{max-width:100%;max-height:80vh;border-radius:4px;}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;cursor:pointer;color:#fff;font-size:1.5rem;background:none;border:none;}

/* ── FOOTER ── */
footer{padding:4rem 5vw;text-align:center;border-top:1px solid var(--glass-bdr);}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<div class="intro-screen" id="introScreen">
  <div class="intro-brand bf"><span>ST</span><span class="inum">117</span></div>
</div>

<header class="nav-container">
  <a class="nav-logo bf" href="#home">ST117</a>
  <nav id="mainNav">
    <button class="nav-btn active" onclick="scrollToSec('home')">Home</button>
    <button class="nav-btn" onclick="scrollToSec('gallery')">Gallery</button>
    <button class="nav-btn" onclick="scrollToSec('info')">Artists</button>
  </nav>
</header>

<section id="home">
  <h1 class="hero-title bf"><span class="ht-st">ST</span><span class="ht-num">117</span></h1>
  <p class="hero-sub">Visual Art Studio</p>
</section>

<section id="gallery" class="sec">
  <div class="sec-header">
    <h2 class="sec-title">The <em>Collection</em></h2>
  </div>
  <div class="feed" id="mainFeed"></div>
</section>

<section id="info" class="sec">
  <div class="sec-header">
    <h2 class="sec-title">The <em>Artists</em></h2>
  </div>
  <div id="artistsContainer" style="text-align:center">Artists will be updated via Admin.</div>
</section>

<div class="lb-wrap" id="lbWrap">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <div class="lb-stage">
    <img id="lbImg" src="" alt=""/>
  </div>
</div>

<footer>
  <div class="footer-brand bf">ST117</div>
  <p>© 2026 Visual Art Studio</p>
</footer>

<script>
(function(){
'use strict';

/* ── CONFIG ── */
var OWNER = 'sitoshtyp-creator';
var REPO  = 'sitoshtyp-creator';

function rawStable(p){
  return 'https://' + OWNER + '.github.io/' + REPO + '/' + p;
}

// ── INTRO ──
setTimeout(function(){
  document.getElementById('introScreen').classList.add('out');
  setTimeout(()=> document.getElementById('introScreen').style.display='none', 500);
}, 1000);

// ── NAV ──
window.scrollToSec = function(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
};

// ── DATA LOADING ──
function loadData(){
  fetch(rawStable('artworks.json'))
    .then(r => r.json())
    .then(data => renderFeed(data))
    .catch(e => console.error("Could not load gallery", e));
}

function renderFeed(list){
  const feed = document.getElementById('mainFeed');
  feed.innerHTML = list.map((a, i) => `
    <div class="feed-card" onclick="openLb('${rawStable(a.image)}')">
      <img src="${rawStable(a.image)}" alt="${a.title}" loading="lazy"/>
    </div>
  `).join('');
}

// ── LIGHTBOX ──
window.openLb = function(src){
  document.getElementById('lbImg').src = src;
  document.getElementById('lbWrap').classList.add('open');
};
window.closeLb = function(){
  document.getElementById('lbWrap').classList.remove('open');
};

// ── CURSOR ──
var mx=0, my=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
function loop(){
  document.getElementById('cur').style.transform = `translate3d(${mx}px, ${my}px, 0) translate(-50%,-50%)`;
  document.getElementById('cur-ring').style.transform = `translate3d(${mx}px, ${my}px, 0) translate(-50%,-50%)`;
  requestAnimationFrame(loop);
}
loop();

loadData();

})();
</script>
</body>
</html>
